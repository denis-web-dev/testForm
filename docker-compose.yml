services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testform_php
    volumes:
      - ./:/var/www/html
    expose:
      - '9000'
    depends_on:
      - db
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: testform_nginx
    ports:
      - '8082:80'
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8.0
    container_name: testform_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: itfreelance
    volumes:
      - mysql_data_testform:/var/lib/mysql
    ports:
      - '3309:3306'

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: testform_phpmyadmin
    restart: always
    ports:
      - '8083:80'
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      - db

volumes:
  mysql_data_testform:
